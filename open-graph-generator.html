<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Open Graph Generator</title>
    <style>
        body { margin: 0; padding: 20px; background: #333; display: flex; justify-content: center; }
        .canvas-container {
            width: 1200px;
            height: 630px;
            background-color: #111111;
            position: relative;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .taxonomy {
            position: absolute;
            top: 120px;
            left: 100px;
            color: #888888;
            font-family: monospace;
            font-size: 1.2rem;
            letter-spacing: 0.2em;
        }
        .name {
            position: absolute;
            top: 260px;
            left: 100px;
            color: #ffffff;
            font-size: 4.5rem;
            font-weight: 800;
            line-height: 1.1;
            letter-spacing: -0.02em;
            margin: 0;
        }
        .subtitle {
            position: absolute;
            top: 420px;
            left: 100px;
            color: #aaaaaa;
            font-size: 1.8rem;
            font-weight: 400;
        }
        .logo-watermark {
            position: absolute;
            right: 80px;
            bottom: 60px;
            color: #ebebeb; /* Color muy sutil para integrarse al fondo */
        }
    </style>
</head>
<body>

    <div class="canvas-container" id="og-image">
        <div class="taxonomy">STATUS / ACTIVE</div>
        
        <h1 class="name">Gabriel Fabrizio<br>Flores Llancaya</h1>
        
        <div class="subtitle">Artificial Intelligence & Software Development</div>
        
        <div class="logo-watermark">
            <svg width="200" height="200" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <line x1="6" y1="3" x2="6" y2="21" />
                <line x1="6" y1="12" x2="14.5" y2="12" />
                <line x1="18" y1="3" x2="11" y2="21" />
            </svg>
        </div>
    </div>

</body>
</html>
